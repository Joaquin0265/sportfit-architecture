<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto | SportFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --accent: #00d4ff; 
            --dark-bg: #0f0f0f; 
        }

        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }

        /* --- NAVBAR GLOBAL --- */
        .top-nav { 
            background-color: var(--dark-bg); 
            padding: 10px 0; 
            border-bottom: 2px solid var(--accent); 
        }
        .search-container { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .search-input { border-radius: 20px 0 0 20px !important; border: none; height: 38px; padding-left: 20px; }
        .search-btn { border-radius: 0 20px 20px 0 !important; background-color: var(--accent); color: #000; border: none; height: 38px; font-weight: bold; }

        /* --- ESTILOS DETALLE --- */
        .img-grande { 
            max-width: 100%; 
            max-height: 500px; 
            object-fit: contain; 
            background: white;
            border-radius: 8px;
        }
        .breadcrumb { font-size: 0.85rem; }
        .btn-login-custom { border: 1px solid #ffffff; color: #ffffff; border-radius: 5px; padding: 5px 15px; text-decoration: none; transition: 0.3s; }
        .btn-login-custom:hover { background-color: #ffffff; color: #000000; }
        
        /* Panel de Cantidad Estilizado */
        .selector-cantidad {
            width: fit-content;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
        }

        /* Card de Productos Relacionados */
        .card-relacionado {
            transition: 0.3s;
            border: none;
        }
        .card-relacionado:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <nav class="top-nav sticky-top">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn text-white fs-3 me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                    <i class="bi bi-list"></i>
                </button>
                <a class="navbar-brand fw-bold fs-2 text-white m-0" href="index.html">
                    SPORT<span style="color: var(--accent);">FIT</span>
                </a>
            </div>

            <div class="search-container d-none d-md-block">
                <div class="input-group">
                    <input type="text" id="input-buscador" class="form-control search-input" placeholder="Buscar en SportFit..." onkeyup="buscarEnTiempoReal()">
                    <button class="btn search-btn" type="button"><i class="bi bi-search"></i></button>
                </div>
            </div>

            <div class="d-flex align-items-center">
                <div id="contenedor-auth"></div>
                <button class="btn btn-outline-info btn-sm position-relative ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuCarrito">
                    <i class="bi bi-cart3 fs-5"></i>
                    <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item active text-muted" id="bread-nombre">Cargando...</li>
            </ol>
        </nav>

        <div class="row bg-white p-4 rounded shadow-sm">
            <div class="col-md-7 text-center border-end">
                <img id="det-img" src="img/placeholder.jpg" class="img-grande p-3" alt="Producto">
            </div>
            
            <div class="col-md-5 ps-md-5 mt-4 mt-md-0">
                <span class="badge bg-info text-dark mb-2">Nuevo 2026</span>
                <h2 id="det-nombre" class="fw-bold text-dark"></h2>
                <p class="text-muted small" id="det-id"></p>
                
                <div class="my-4">
                    <h1 class="text-primary fw-bold" id="det-precio"></h1>
                    <p class="text-success small fw-bold"><i class="bi bi-truck me-1"></i> Envío gratis a todo Lima</p>
                </div>

                <hr>
                <p class="mt-4 text-secondary" id="det-desc"></p>
                
                <div class="mt-4">
                    <label class="fw-bold mb-2 small text-uppercase text-muted">Cantidad:</label>
                    <div class="d-flex align-items-center selector-cantidad rounded-pill px-3 py-2">
                        <button class="btn btn-sm p-0 border-0" onclick="ajustarCantidadDetalle(-1)">
                            <i class="bi bi-dash-circle fs-4 text-secondary"></i>
                        </button>
                        <span id="cant-detalle" class="mx-3 fw-bold fs-5" style="min-width: 30px; text-align: center;">1</span>
                        <button class="btn btn-sm p-0 border-0" onclick="ajustarCantidadDetalle(1)">
                            <i class="bi bi-plus-circle fs-4 text-primary"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid gap-3 mt-5">
                    <button id="det-btn" class="btn btn-primary btn-lg py-3 fw-bold shadow-sm">
                        <i class="bi bi-cart-plus me-2"></i> AGREGAR AL CARRITO
                    </button>
                    <a href="index.html" class="btn btn-link text-decoration-none text-muted">
                        <i class="bi bi-arrow-left me-1"></i> Seguir comprando
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h4 class="fw-bold mb-4 border-start border-4 border-info ps-3">TAMBIÉN TE PODRÍA INTERESAR</h4>
            <div class="row g-3" id="productos-relacionados">
                </div>
        </div>
    </div>

    <div class="mt-5 bg-white p-4 rounded shadow-sm">
            <h4 class="fw-bold mb-4 border-start border-4 border-primary ps-3">OPINIONES DEL PRODUCTO</h4>
            
            <div class="mb-5 bg-light p-4 rounded border">
                <h6 class="fw-bold mb-3">Deja tu opinión</h6>
                <form id="form-comentario">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Calificación</label>
                        <select id="comentario-estrellas" class="form-select w-auto border-warning text-warning fw-bold">
                            <option value="5">★★★★★ (5/5)</option>
                            <option value="4">★★★★☆ (4/5)</option>
                            <option value="3">★★★☆☆ (3/5)</option>
                            <option value="2">★★☆☆☆ (2/5)</option>
                            <option value="1">★☆☆☆☆ (1/5)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <textarea id="comentario-texto" class="form-control" rows="3" placeholder="¿Qué te pareció el producto? Cuéntanos tu experiencia..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary fw-bold shadow-sm">Publicar comentario</button>
                </form>
            </div>

            <div id="lista-comentarios">
                </div>
        </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuLateral">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">DEPARTAMENTOS</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="list-group list-group-flush" id="lista-categorias-menu"></div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuCarrito">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="offcanvas-title fw-bold">Tu Pedido</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="items-carrito" class="flex-grow-1 overflow-auto"></div>
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <span class="h5">Total:</span>
                    <span id="total-carrito" class="h4 text-primary fw-bold">S/ 0.00</span>
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold" id="btn-checkout">FINALIZAR COMPRA</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script> 
    <script src="js/detalle.js"></script>

    <div class="modal fade" id="modalMisPedidos" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold"><i class="bi bi-bag-check me-2"></i>Mi Historial de Compras</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light" id="lista-mis-pedidos">
                    </div>
            </div>
        </div>
    </div>

</body>
</html>

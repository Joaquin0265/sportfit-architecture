<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SportFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --accent: #00d4ff; 
        }

        body {
            /* Usamos la imagen 'login.jpg' que ya tienes en tu carpeta img */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('img/login.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        .card-login {
            background: rgba(255, 255, 255, 0.08); /* Fondo semi-transparente */
            backdrop-filter: blur(12px); /* El efecto de vidrio esmerilado */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 45px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .btn-primary { 
            background-color: var(--accent); 
            border: none; 
            color: #000; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover { 
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
            color: #000;
        }

        .form-control { 
            background: rgba(255, 255, 255, 0.9) !important; 
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.4);
        }

        .text-accent { color: var(--accent); }
        
        .label-custom {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-login">
        <h2 class="fw-bold mb-1" style="font-size: 2.2rem;">SPORT<span class="text-accent">FIT</span></h2>
        <p class="text-white-50 mb-4 small">Ingresa tus credenciales de acceso</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="label-custom fw-bold">Correo electrónico</label>
                <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-4">
                <label class="label-custom fw-bold">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
            </button>
        </form>
        
        <div class="mt-4">
            <p class="small text-white-50 mb-0">
                ¿No tienes cuenta? <a href="registro.html" class="text-accent fw-bold text-decoration-none">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardamos los datos de sesión en el navegador
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user_role', data.rol); 
                    localStorage.setItem('user_name', data.usuario.nombre);

                    // Redirección basada en el rol o correo específico de admin
                    if (data.rol === 'Admin' || data.rol === 'Administrador' || correo === 'yerri.admin@proyectos.com') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert(data.mensaje || "Credenciales incorrectas");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Error de conexión. Asegúrate de que el servidor esté corriendo en el puerto 3000.");
            }
        });
    </script>
</body>
</html>

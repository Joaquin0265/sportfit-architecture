<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SportFit</title>
    <!-- Mismas fuentes y estilos que el Login -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --accent: #00d4ff; 
        }

        body {
            /* Usamos la misma imagen de fondo para mantener la estética */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('img/login.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        .card-register {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px; /* Un poco más ancho para que los campos luzcan mejor */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .btn-primary { 
            background-color: var(--accent); 
            border: none; 
            color: #000; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover { 
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
            color: #000;
        }

        .form-control { 
            background: rgba(255, 255, 255, 0.9) !important; 
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.4);
        }

        .text-accent { color: var(--accent); }
        
        .label-custom {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-size: 0.80rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-register">
        <h2 class="fw-bold mb-1" style="font-size: 2.2rem;">SPORT<span class="text-accent">FIT</span></h2>
        <p class="text-white-50 mb-4 small">Crea una cuenta para empezar tu entrenamiento</p>
        
        <form id="formRegistro">
            <div class="mb-3">
                <label class="label-custom fw-bold">Nombre completo</label>
                <input type="text" id="nom" class="form-control" placeholder="Tu nombre" required>
            </div>
            
            <div class="mb-3">
                <label class="label-custom fw-bold">Correo electrónico</label>
                <input type="email" id="corr" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="mb-4">
                <label class="label-custom fw-bold">Contraseña</label>
                <input type="password" id="pass" class="form-control" placeholder="Mínimo 8 caracteres" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                <i class="bi bi-person-plus-fill me-2"></i> Unirse ahora
            </button>
        </form>
        
        <div class="mt-4">
            <p class="small text-white-50 mb-0">
                ¿Ya tienes una cuenta? <a href="login.html" class="text-accent fw-bold text-decoration-none">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuarioData = {
                nombre: document.getElementById('nom').value,
                correo: document.getElementById('corr').value,
                password: document.getElementById('pass').value
            };

            try {
                const res = await fetch('/api/auth/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(usuarioData)
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ " + data.mensaje);
                    window.location.href = 'login.html';
                } else {
                    alert("❌ " + (data.error || "Error al registrarse"));
                }
            } catch (error) {
                console.error("Error:", error);
                alert("❌ No se pudo conectar con el servidor. Verifica que esté corriendo en el puerto 3000.");
            }
        });
    </script>
</body>
</html>

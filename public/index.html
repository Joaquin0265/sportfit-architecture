<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportFit | Suplementos Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --accent: #00d4ff; 
            --dark-bg: #0f0f0f; 
        }

        /* --- CORRECCIÓN: ANCHO DEL MENÚ LATERAL REDUCIDO --- */
        #menuLateral {
            width: 280px !important;
        }

        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }

        /* --- NAVBAR GLOBAL --- */
        .top-nav { 
            background-color: var(--dark-bg); 
            padding: 10px 0; 
            border-bottom: 2px solid var(--accent); 
        }
        
        .search-container { 
            flex-grow: 1; 
            max-width: 500px; 
            margin: 0 20px; 
        }
        
        .search-input { 
            border-radius: 20px 0 0 20px !important; 
            border: none; 
            height: 38px;
            padding-left: 20px; 
        }
        
        .search-btn { 
            border-radius: 0 20px 20px 0 !important; 
            background-color: var(--accent); 
            color: #000; 
            border: none; 
            height: 38px;
            font-weight: bold; 
        }

        /* --- HERO --- */
        .hero { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), 
                        url('img/login2.jpg') no-repeat center center;
            background-size: cover;
            color: white; 
            padding: 40px 0; 
            min-height: 220px; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 5px; }

        /* --- PRODUCTOS --- */
        .contenedor-img-producto { 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            padding: 15px; 
            position: relative;
        }
        
        .img-producto-ajustada { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.3s ease;
        }

        .card-producto { 
            border: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            overflow: hidden; 
            transition: 0.3s; 
            height: 100%;
        }
        
        .card-producto:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .card-producto:hover .img-producto-ajustada { transform: scale(1.05); }

        .stock-badge { 
            font-size: 0.75rem; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-weight: bold; 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            z-index: 2;
        }
        .stock-bajo { background-color: #ff0000; color: #fff; }
        .stock-ok { background-color: var(--accent); color: #000; }

        .btn-login-custom {
            border: 1px solid #ffffff;
            color: #ffffff;
            border-radius: 5px;
            padding: 5px 15px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-login-custom:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .bg-light.rounded-pill {
            background-color: #f8f9fa !important;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>

    <nav class="top-nav sticky-top">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn text-white fs-3 me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                    <i class="bi bi-list"></i>
                </button>
                <a class="navbar-brand fw-bold fs-2 text-white m-0" href="index.html">
                    SPORT<span style="color: var(--accent);">FIT</span>
                </a>
            </div>

            <div class="search-container d-none d-md-block">
                <div class="input-group">
                    <input type="text" id="input-buscador" class="form-control search-input" placeholder="¿Qué estás buscando?" onkeyup="buscarEnTiempoReal()">
                    <button class="btn search-btn" type="button"><i class="bi bi-search"></i></button>
                </div>
            </div>

            <div class="d-flex align-items-center">
                <div id="contenedor-auth"></div>
                
                <button class="btn btn-outline-info btn-sm position-relative ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuCarrito">
                    <i class="bi bi-cart3 fs-5"></i>
                    <span id="contador-carrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero text-center">
        <div class="container">
            <h1 class="fw-bold">EQUIPO <span style="color: var(--accent);">PROFESIONAL</span></h1>
            <p class="lead fw-semibold mb-0">Lleva tu entrenamiento al siguiente nivel con lo mejor.</p>
        </div>
    </header>

    <main class="container my-5">
        <h3 id="titulo-seccion" class="fw-bold mb-4 border-start border-4 border-info ps-3">TODOS LOS PRODUCTOS</h3>
        <div class="row g-4" id="lista-productos">
            </div>
    </main>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuLateral">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">DEPARTAMENTOS</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="list-group list-group-flush" id="lista-categorias-menu"></div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuCarrito">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="offcanvas-title fw-bold">Tu Pedido</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="items-carrito" class="flex-grow-1 overflow-auto"></div>
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <span class="h5">Total:</span>
                    <span id="total-carrito" class="h4 text-primary fw-bold">S/ 0.00</span>
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold" id="btn-checkout">FINALIZAR COMPRA</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>

    <div class="modal fade" id="modalMisPedidos" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold"><i class="bi bi-bag-check me-2"></i>Mi Historial de Compras</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light" id="lista-mis-pedidos">
                    </div>
            </div>
        </div>
    </div>
</body>
</html>
